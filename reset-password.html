<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lumina Digital — Reset Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <style>
    :root { color-scheme: dark; --bg:#020617; --surface:rgba(15,23,42,0.72); --text:#e2e8f0; --muted:#94a3b8; --primary:#7dd3fc; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; font-family:'Inter',sans-serif; color:var(--text); background:radial-gradient(circle at top left, rgba(125,211,252,0.14), transparent 35%), radial-gradient(circle at bottom right, rgba(56,189,248,0.14), transparent 40%), var(--bg); display:grid; place-items:center; padding:24px; }
    .card { width:min(100%, 480px); background:var(--surface); border:1px solid rgba(125,211,252,0.18); border-radius:26px; box-shadow:0 24px 80px rgba(2,6,23,0.45); backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px); padding:28px; }
    .brand { display:flex; gap:12px; align-items:center; margin-bottom:10px; }
    .brand-badge { width:44px; height:44px; border-radius:14px; display:grid; place-items:center; background:rgba(125,211,252,0.12); border:1px solid rgba(125,211,252,0.2); color:var(--primary); }
    h1 { margin:0; font-size:1.3rem; }
    .subtitle { margin:4px 0 0; color:var(--muted); }
    .alert { margin:16px 0 0; padding:12px 14px; border-radius:12px; border:1px solid transparent; display:none; }
    .alert.error { display:flex; color:#fecaca; background:rgba(248,113,113,0.1); border-color:rgba(248,113,113,0.2); }
    .alert.success { display:flex; color:#bbf7d0; background:rgba(74,222,128,0.1); border-color:rgba(74,222,128,0.2); }
    label { display:block; font-size:0.86rem; color:var(--muted); margin:14px 0 8px; }
    input { width:100%; border-radius:14px; border:1px solid rgba(125,211,252,0.14); background:rgba(2,6,23,0.4); color:var(--text); padding:12px 14px; font-size:0.95rem; outline:none; }
    input:focus { border-color:rgba(125,211,252,0.45); box-shadow:0 0 0 3px rgba(125,211,252,0.12); }
    button { width:100%; margin-top:18px; border:0; border-radius:14px; background:linear-gradient(135deg, rgba(125,211,252,0.3), rgba(56,189,248,0.45)); color:white; padding:13px 16px; font-weight:700; cursor:pointer; }
    .foot { margin-top:16px; font-size:0.92rem; color:var(--muted); text-align:center; }
    .foot a { color:var(--primary); text-decoration:none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand"><div class="brand-badge"><span class="material-symbols-outlined">bubble</span></div><div><h1>Choose a new password</h1><p class="subtitle">Use a strong password to protect your workspace account.</p></div></div>
    <div class="alert error" id="error-box"></div>
    <div class="alert success" id="success-box"></div>
    <form id="resetForm">
      <label for="password">New password</label>
      <input id="password" type="password" placeholder="Create a strong password" required />
      <label for="confirmPassword">Confirm password</label>
      <input id="confirmPassword" type="password" placeholder="Confirm password" required />
      <button type="submit">Update password</button>
    </form>
    <div class="foot"><a href="/login">Return to sign in</a></div>
  </div>
  <script>
    const form=document.getElementById('resetForm');
    const errorBox=document.getElementById('error-box');
    const successBox=document.getElementById('success-box');
    const params=new URLSearchParams(window.location.search);
    const token=params.get('token')||'';
    function setMessage(type, message){ errorBox.style.display='none'; successBox.style.display='none'; if(!message) return; const box=type==='error'?errorBox:successBox; box.textContent=message; box.style.display='flex'; }
    form.addEventListener('submit', async (event)=>{ event.preventDefault(); setMessage(''); const password=document.getElementById('password').value; const confirmPassword=document.getElementById('confirmPassword').value; if(password!==confirmPassword){ setMessage('error','Passwords do not match.'); return; } try { const res=await fetch('/api/auth/reset-password',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({token,password})}); const data=await res.json(); if(!res.ok) throw new Error(data.error||'Unable to update password.'); setMessage('success','Password updated. You can now sign in.'); window.location.href='/login'; } catch(error){ setMessage('error', error.message||'Unable to update password.'); }});
  </script>
</body>
</html>
